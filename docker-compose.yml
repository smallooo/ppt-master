services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ppt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ppt_dev_pwd}
      POSTGRES_DB: ${POSTGRES_DB:-ppt_master}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ppt} -d ${POSTGRES_DB:-ppt_master}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # docker 网络内访问 postgres 服务名，覆盖 .env 里的 127.0.0.1
      POSTGRES_HOST: postgres
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-ppt}:${POSTGRES_PASSWORD:-ppt_dev_pwd}@postgres:5432/${POSTGRES_DB:-ppt_master}
      PPT_SERVICE_WORKSPACE_ROOT: /data
    ports:
      - "${PPT_SERVICE_PORT:-8000}:8000"
    volumes:
      - service_data:/data

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8080:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pg_data:
  service_data:
